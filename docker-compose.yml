services:
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8010:80"
    networks:
      - qgis-server-net
    restart: "no"
    depends_on:
      - qgis-server

  qgis-server:
    image: qgis/qgis-server:stable
    platform: linux/amd64
    environment:
      SKIP_NGINX: "true"
      QT_QPA_PLATFORM: "offscreen"
      DISPLAY: ":99"
      QGIS_SERVER_PARALLEL_RENDERING: "true"
      QGIS_SERVER_MAX_THREADS: "4"
      QGIS_SERVER_WMS_MAX_HEIGHT: "5000"
      QGIS_SERVER_WMS_MAX_WIDTH: "5000"
    command:
      - /bin/sh
      - -lc
      - |
        /usr/bin/Xvfb :99 -ac -screen 0 1280x1024x16 +extension GLX +render -noreset >/dev/null 2>&1 &
        exec spawn-fcgi -n -a 0.0.0.0 -p 9993 -u www-data -g www-data -d /var/lib/qgis -- /usr/lib/cgi-bin/qgis_mapserv.fcgi
    networks:
      - qgis-server-net
    volumes:
      - ./data:/io/data:rw
      - ./plugins:/io/plugins
      - ./fonts:/usr/share/fonts:ro
      - ./svg:/var/lib/qgis/.local/share/QGIS/QGIS3/profiles/default/svg:rw
    restart: "no"

  qgis:
    container_name: qgis
    build: ./qgis
    ports:
      - "9000:8000"
    volumes:
      - ./qgis:/app
      - ./data:/data
    environment:
      - QT_QPA_PLATFORM=offscreen
      - QGIS_PREFIX_PATH=/usr
      - PYTHONPATH=/usr/share/qgis/python
      - LD_LIBRARY_PATH=/usr/lib/qgis
      - DATA_PATH=/data
      - GDAL_NUM_THREADS=ALL_CPUS
      - GDAL_CACHEMAX=512
      - CPL_NUM_CPUS=ALL_CPUS
      - GDAL_DISABLE_READDIR_ON_OPEN=EMPTY_DIR
    networks: 
      - qgis-server-net

  backend:
    container_name: backend
    build: ./backend
    ports:
      - "8000:8000"
    networks:
      - qgis-server-net
    volumes:
      - ./backend:/app
      - ./data:/data

  frontend:
    container_name: frontend
    build: ./frontend
    ports:
      - "5173:5173"
    networks:
      - qgis-server-net
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
    command: sh -c "npm ci --include=dev && exec npm run dev -- --host"

networks:
  qgis-server-net:
    driver: bridge