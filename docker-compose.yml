services:
  nginx:
    image: "nginx"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8010:80"
    networks: 
      - qgis-server-net
    restart: always
    depends_on:
      - qgis-server
 
  qgis-server:
    image: "qgis/qgis-server:stable"
    environment:
      # Do not run the embedded copy of nginx
      SKIP_NGINX: "true"
      # Improve rendering performance
      QGIS_SERVER_PARALLEL_RENDERING: "true"
      QGIS_SERVER_MAX_THREADS: 4
      # Limit the maximum size returned by a GetMap
      QGIS_SERVER_WMS_MAX_HEIGHT: 5000
      QGIS_SERVER_WMS_MAX_WIDTH: 5000
    networks:
      - qgis-server-net
    volumes:
      - ./data:/io/data:rw
    restart: always
  
  qgis:
    container_name: qgis
    build: ./qgis
    ports:
      - "9000:8000"
    volumes:
      - ./qgis:/app
      - ./data:/data
    environment:
      - QT_QPA_PLATFORM=offscreen
      - QGIS_PREFIX_PATH=/usr
      - PYTHONPATH=/usr/share/qgis/python
      - LD_LIBRARY_PATH=/usr/lib/qgis
      - DATA_PATH=/data
    networks: 
      - qgis-server-net

  backend:
    container_name: backend
    build: ./backend
    ports:
      - "8000:8000"
    networks:
      - qgis-server-net
    volumes:
      - ./backend:/app
      - ./data:/data

